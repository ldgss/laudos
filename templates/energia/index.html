{% extends "base/base.html" %}

{% block header %}
    <script defer src="{{url_for("static", filename="js/mercaderia/utils.js")}}"></script>

{% endblock %}

{% block content %}

<div class="container col-sm-12 col-md-8 col-lg-6">

    <form action="/envasado/buscar" method="post">
        <div class="m-3">
            <label class="form-label" for="buscar">Buscar por fecha (sin etiquetado, sin encajonado, sin reacondicionamiento)</label>
            <input class="form-control" required
            placeholder="Ingrese numero de parte, lote, fechas, observaciones" 
            type="text" id="buscar" name="buscar">
        </div>
        <div class="m-3">
            <button type="submit" class="btn btn-primary col-12">Buscar</button>
        </div>
    </form>

    <div class="m-3">
        <a href="{{url_for('envasado.envasado_agregar')}}" class="btn btn-success col-12">Agregar</a>
    </div>
    <div class="m-3">
        <a href="javascript:void(0);" class="btn btn-secondary col-12" onclick="boton_volver()">Volver</a>

    </div>
    

    <div>
  <canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Enero', 'Febrero', 'Marzo','Abril','Mayo','Junio'],
      datasets: [{
        label: 'Consumo',
        data: [12, 19, 3, 5, 2, 3],
        backgroundColor: 'rgba(249, 255, 69, 0.52)',
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>


</div>
{% endblock %}
