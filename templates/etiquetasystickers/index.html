{% extends "base/base.html" %}

{% block header %}
    <script defer src="{{url_for("static", filename="js/mercaderia/utils.js")}}"></script>
    <script defer src="{{url_for("static", filename="js/etiquetasystickers/utils.js")}}"></script>

{% endblock %}

{% block content %}

<div class="container col-sm-12 col-md-8 col-lg-6">

        <div class="m-3">
                <label class="form-label" for="buscar">Buscar etiquetas y stickers</label>
                <input list="denominacion_opciones" required type="text" 
                class="form-control" name="denominacion" id="denominacion"
                onblur="validarMarca(); rellenarCantidad()" oninput="actualizarValoresOcultos()">
                <input type="hidden" id="cod_cls" name="cod_cls">
                <input type="hidden" id="cod_mae" name="cod_mae">
                <datalist id="denominacion_opciones">
                    {% for p in etiquetasystickers %}
                    <option value="{{ p.denominacion | trim }}" 
                    data-clase="{{ p.codigo_clase | trim }}" 
                    data-codigo="{{ p.codigo | trim }}">
                </option>
                {% endfor %}
            </datalist>
        </div>

        <div class="m-3">
            <button id="buscar" class="btn btn-success col-12">Actualizar</button>
        </div>
        <div class="m-3">
            <a href="{{url_for('etiquetasystickers.etiquetasystickers_listado')}}" class="btn btn-primary col-12">Listado completo</a>
        </div>



    <div class="m-3">
        <a href="javascript:void(0);" class="btn btn-secondary col-12" onclick="boton_volver()">Volver</a>

    </div>
</div>

<!-- Modal etiquetasystickers -->
<div class="modal fade" id="modal_etiquetasystickers" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cambiar imagen de la etiqueta/sticker</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="form_modal_etiquetasystickers" action="etiquetasystickers/guardar" method="post" enctype="multipart/form-data">
                    <div class="row m-4 justify-content-center">
                        <label for="denominacion_modal4" class="col-sm-4 col-form-label">Denominacion</label>
                        <div class="col-sm-8">
                            <input class="form-control" readonly name="denominacion_modal_visible" id="denominacion_modal_visible">
                            <input type="hidden" id="id_modal" name="id_modal">
                            <input type="hidden" id="denominacion_modal" name="denominacion_modal">
                            <input type="hidden" id="codigo_modal" name="codigo_modal">
                            <input type="hidden" id="clase_modal" name="clase_modal">
                        </div>
                    </div>

                    <div class="row m-4 justify-content-center">
                        <label for="imagenes" class="col-sm-4 col-form-label">Imagen</label>
                        <div class="col-sm-8">
                            <input id="imagenes_1" name="imagenes" required class="form-control mb-2"
                            type="file" accept="image/*" capture="environment">
                        </div>
                    </div>
                    

                    <div id="imagenes_existentes" class="text-center"></div>
                
                    <div class="row m-4 justify-content-center">
                        <div class="m-2 text-center">
                            <button type="submit" class="btn btn-primary">Guardar</button>
                            <!-- <a href="javascript:void(0);" class="btn btn-secondary" onclick="boton_volver()">Volver</a> -->
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal para mostrar imágenes -->
<div class="modal fade" id="modalImagen" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-body p-0 text-center">
        <img id="imagenAmpliada" src="" class="img-fluid" alt="imagen ampliada">
      </div>
    </div>
  </div>
</div>
{% endblock %}
