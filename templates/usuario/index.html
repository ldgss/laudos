{% extends "base/base.html" %}

{% block header %}
    <script defer src="{{url_for("static", filename="js/usuario/utils.js")}}"></script>
{% endblock %}

{% block content %}



<div class="container col-sm-12 col-md-8 col-lg-6">
    <ul>
        {% for u in active_users %}
        <li>
            {{ u["usuario"] }} - {{ u["ultima_actividad"].strftime('%Y-%m-%d %H:%M') }}
        </li>
        {% endfor %}
    </ul>
    <div class="m-3">
        <label class="form-label" for="buscar">Identificador de dispositivo</label>
        <input class="form-control" placeholder="Ingrese Identificador, mac, etc."
            type="text" id="device" name="device" maxlength="12">
    </div>
    <div class="m-3">
        <button class="btn btn-outline-danger col-12" id="guardar" name="guardar">Guardar</button>
    </div>
</div>
{% endblock %}
